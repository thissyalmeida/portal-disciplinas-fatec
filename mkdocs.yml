site_name: Portal Acadêmico
site_description: Materiais de Aula 
site_author: Profª Thissiany Almeida 

theme: 
  name: material 
  language: pt-BR
  logo: assets/images/logo-fatec.jpg
  favicon: assets/images/logo-fatec.jpg
  
  palette: 
    
    - media: "(prefers-color-scheme: light)" 
      scheme: default 
      primary: black 
      accent: red 
      
      toggle:
       icon: material/weather-night 
       name: Tema Escuro 
    
    - media: "(prefers-color-scheme: dark)" 
      scheme: slate 
      primary: black 
      accent: red 
      
      toggle: 
        icon: material/weather-sunny 
        name: Tema Claro 
        
  features: 
    - navigation.tabs 
    - navigation.sections 
    - navigation.expand 
    - navigation.top 
    - navigation.instant 
    - navigation.tracking 
    - search.highlight 
    - search.suggest 
    - content.code.copy 
    - content.tabs.link 
    - toc.follow 

markdown_extensions: 
    - admonition 
    - attr_list 
    - md_in_html 
    - tables 
    - footnotes 
    - pymdownx.details 
    - pymdownx.superfences 
    - pymdownx.tabbed: 
        alternate_style: true 
    - pymdownx.highlight 
    - pymdownx.inlinehilite 
    - pymdownx.keys 
    - pymdownx.snippets 
    - pymdownx.emoji: 
        emoji_index: !!python/name:material.extensions.emoji.twemoji 
        emoji_generator: !!python/name:material.extensions.emoji.to_svg 

